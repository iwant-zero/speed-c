<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>스피드키노 빈도 기반 추천기</title>
  <style>
    :root{
      --bg:#0b0f1a; --panel:#121a2b; --panel2:#0f1626; --text:#eaf0ff; --muted:#9fb1d6;
      --line:rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --r:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", Arial;
      background: radial-gradient(1200px 600px at 10% 0%, rgba(80,120,255,.20), transparent 55%),
                  radial-gradient(900px 500px at 90% 10%, rgba(255,120,180,.14), transparent 50%),
                  var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1100px; margin:0 auto; padding:22px 16px 40px}
    header{
      display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; justify-content:space-between;
      padding:18px; border:1px solid var(--line); border-radius:var(--r);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow:var(--shadow);
    }
    .title{display:flex; flex-direction:column; gap:6px;}
    .title h1{margin:0; font-size:20px; letter-spacing:-.2px}
    .title p{margin:0; color:var(--muted); font-size:13px; line-height:1.45}
    .pillrow{display:flex; flex-wrap:wrap; gap:8px; align-items:center}
    .pill{
      font-size:12px; color:var(--muted);
      padding:7px 10px; border:1px solid var(--line); border-radius:999px; background:rgba(0,0,0,.15);
    }
    .grid{margin-top:14px; display:grid; grid-template-columns: 1.2fr .8fr; gap:14px;}
    @media (max-width: 980px){ .grid{grid-template-columns:1fr} }
    .card{
      border:1px solid var(--line); border-radius:var(--r);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow:var(--shadow); overflow:hidden;
    }
    .card .hd{
      padding:14px 14px 12px; border-bottom:1px solid var(--line);
      display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between;
      background:rgba(0,0,0,.12);
    }
    .card .hd h2{margin:0; font-size:15px}
    .card .bd{padding:14px}
    .muted{color:var(--muted); font-size:13px; line-height:1.5}
    .btnrow{display:flex; flex-wrap:wrap; gap:8px; align-items:center}
    button{
      appearance:none; border:1px solid var(--line); background:rgba(0,0,0,.18);
      color:var(--text); padding:10px 12px; border-radius:12px; cursor:pointer;
      font-weight:700; letter-spacing:-.1px;
    }
    button:hover{transform: translateY(-1px); transition:.12s}
    button.primary{
      background:linear-gradient(180deg, rgba(120,160,255,.28), rgba(50,90,255,.18));
      border-color: rgba(160,190,255,.35);
    }
    button.ghost{background:rgba(0,0,0,.08)}
    .sets{display:flex; flex-direction:column; gap:10px}
    .set{border:1px solid var(--line); border-radius:12px; background:rgba(0,0,0,.14); padding:12px;}
    .set .top{display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between; margin-bottom:8px;}
    .set .label{font-size:13px; color:var(--muted)}
    .set .meta{font-size:12px; color:var(--muted)}
    .balls{display:flex; flex-wrap:wrap; gap:8px}
    .ball{
      width:44px; height:44px; border-radius:999px;
      display:inline-flex; align-items:center; justify-content:center;
      font-weight:900; letter-spacing:-.3px;
      border:1px solid rgba(255,255,255,.18);
      box-shadow: 0 10px 18px rgba(0,0,0,.28), inset 0 0 0 1px rgba(0,0,0,.15);
      user-select:none;
    }
    .ball.ghost{background:rgba(255,255,255,.06); color:rgba(255,255,255,.55);}
    .c1{background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,0) 45%), linear-gradient(180deg,#ff6b6b,#e63946);}
    .c2{background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,0) 45%), linear-gradient(180deg,#ffa94d,#f76707);}
    .c3{background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,0) 45%), linear-gradient(180deg,#ffd43b,#f59f00);}
    .c4{background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,0) 45%), linear-gradient(180deg,#69db7c,#2f9e44);}
    .c5{background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,0) 45%), linear-gradient(180deg,#4dabf7,#1864ab);}
    .c6{background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,0) 45%), linear-gradient(180deg,#b197fc,#7048e8);}
    .c7{background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,0) 45%), linear-gradient(180deg,#f783ac,#c2255c);}
    .miniGrid{display:grid; grid-template-columns: repeat(10, minmax(0,1fr)); gap:8px; margin-top:10px;}
    @media (max-width: 420px){ .miniGrid{grid-template-columns: repeat(8, minmax(0,1fr));} }
    .mini{border:1px solid var(--line); border-radius:10px; padding:8px 8px; background:rgba(0,0,0,.14); display:flex; flex-direction:column; gap:4px; align-items:flex-start;}
    .mini b{font-size:13px}
    .mini span{font-size:11px; color:var(--muted)}
    .hint{margin-top:12px; padding:10px 12px; border:1px dashed rgba(255,255,255,.18); border-radius:12px; color:var(--muted); font-size:12px; line-height:1.5; background:rgba(0,0,0,.10);}
    .err{padding:12px; border:1px solid rgba(255,120,120,.35); background:rgba(255,120,120,.08); border-radius:12px; color:#ffd7d7; font-size:13px; line-height:1.45;}
    .krow{display:flex; flex-wrap:wrap; gap:8px; align-items:center}
    .kbd{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; padding:3px 7px; border-radius:8px; border:1px solid var(--line); background:rgba(0,0,0,.2); color:var(--text);}
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>스피드키노 빈도 기반 추천기 (Pick10)</h1>
        <p>무작위 생성 없이, 저장된 <b>추첨번호 빈도(누적/최근)</b>로 추천 조합을 만들고 버튼 재클릭 시 <b>cycle</b>로 조합이 바뀝니다.</p>
      </div>
      <div class="pillrow">
        <div class="pill" id="pillUpdated">데이터 갱신: -</div>
        <div class="pill" id="pillDraws">누적 회차: -</div>
        <div class="pill" id="pillLatest">최신 회차: -</div>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <div class="hd">
          <h2>번호 추천</h2>
          <div class="btnrow">
            <button class="primary" id="btn1">1개 추천</button>
            <button class="primary" id="btn5">5개 추천</button>
            <button class="primary" id="btn10">10개 추천</button>
            <button class="ghost" id="btnNext">같은 모드로 재생성</button>
          </div>
        </div>
        <div class="bd">
          <div class="muted" style="margin-bottom:10px">
            * “번호 호출”처럼 1개씩 표시되지만, 조합 자체는 <b>데이터 기반 규칙</b>으로 확정된 값입니다.
          </div>
          <div id="sets" class="sets"></div>

          <div class="hint">
            <div class="krow" style="margin-bottom:6px">
              이슈에서 자동 추천:
              <span class="kbd">/speed</span>
              <span class="kbd">/speed 1</span>
              <span class="kbd">/speed 5</span>
              <span class="kbd">/speed 10</span>
            </div>
            ※ 참고: 과거 빈도는 미래 당첨을 보장하지 않습니다.
          </div>
        </div>
      </section>

      <aside class="card">
        <div class="hd">
          <h2>상위 빈도(Top 20)</h2>
          <div class="muted" id="topNote">-</div>
        </div>
        <div class="bd">
          <div id="topGrid" class="miniGrid"></div>

          <div style="height:10px"></div>

          <div class="muted" style="margin-bottom:6px"><b>최근 저장된 추첨번호(3개)</b></div>
          <div id="recentDraws" class="sets"></div>

          <div id="errBox" style="display:none" class="err"></div>
        </div>
      </aside>
    </div>
  </div>

<script>
  // ✅ Pages 소스가 root든 speed-c든 둘 다 대응하도록 후보 경로 2개 준비
  const FREQ_CANDIDATES = [
    "./data/speed_freq.json",   // Pages 소스가 speed-c/ 일 때
    "../data/speed_freq.json"   // Pages 소스가 /(root) 일 때
  ];
  const DRAWS_CANDIDATES = [
    "./data/speed_draws.json",
    "../data/speed_draws.json"
  ];

  const el = (id) => document.getElementById(id);

  const state = { freq:null, draws:[], mode:10, cycle:0 };

  const pad2 = (n)=> String(n).padStart(2,"0");
  const colorClass = (n)=>{
    if(n<=10) return "c1";
    if(n<=20) return "c2";
    if(n<=30) return "c3";
    if(n<=40) return "c4";
    if(n<=50) return "c5";
    if(n<=60) return "c6";
    return "c7";
  };

  function stats(nums){
    const underLine = 35;
    let odd=0, under=0, sum=0;
    nums.forEach(n=>{
      if(n%2===1) odd++;
      if(n<=underLine) under++;
      sum += n;
    });
    return { odd, even: nums.length-odd, under, over: nums.length-under, sum };
  }

  function loadCycle(mode){
    const key = `speedkino_cycle_${mode}`;
    const v = Number(localStorage.getItem(key) || "0");
    return Number.isFinite(v) ? v : 0;
  }
  function saveCycle(mode, v){
    const key = `speedkino_cycle_${mode}`;
    localStorage.setItem(key, String(v));
  }

  async function tryFetchJson(url){
    const res = await fetch(url + "?v=" + Date.now());
    if(!res.ok) return { ok:false, status:res.status };
    return { ok:true, json: await res.json() };
  }

  async function fetchJsonWithFallback(candidates){
    let lastStatus = 0;
    for(const u of candidates){
      const r = await tryFetchJson(u);
      if(r.ok) return r.json;
      lastStatus = r.status || lastStatus;
    }
    throw new Error(`HTTP ${lastStatus || 404}`);
  }

  function buildScoreRank(freq, recent, wAll=0.7, wRec=1.3){
    const score = [];
    for(let n=1; n<=70; n++){
      const all = Number(freq[String(n)] || 0);
      const rec = Number(recent[String(n)] || 0);
      score.push({ n, s: all*wAll + rec*wRec, all, rec });
    }
    score.sort((a,b)=> (b.s-a.s) || (b.rec-a.rec) || (b.all-a.all) || (a.n-b.n));
    return score.map(x=>x.n);
  }

  function makePickSet({ baseRankNums, plan, caps, offset, step }){
    const underLine = 35;
    const top = baseRankNums.slice(0, plan.topCut);
    const mid = baseRankNums.slice(plan.topCut, plan.midCut);
    const low = baseRankNums.slice(plan.midCut);

    const attempt = (c) => {
      const picked = [];
      const used = new Set();
      const lastDigit = new Set();
      let odd=0, even=0, under=0, over=0;

      const isOdd = (n)=> n%2===1;
      const isUnder = (n)=> n<=underLine;

      const okGap = (n)=>{
        if(!c.minGap) return true;
        for(const p of picked){
          if(Math.abs(p-n) < c.minGap) return false;
        }
        return true;
      };

      const canAdd = (n)=>{
        if(used.has(n)) return false;
        if(!okGap(n)) return false;

        const od = isOdd(n);
        const un = isUnder(n);

        if(c.maxOdd!=null && od && odd>=c.maxOdd) return false;
        if(c.maxEven!=null && !od && even>=c.maxEven) return false;
        if(c.maxUnder!=null && un && under>=c.maxUnder) return false;
        if(c.maxOver!=null && !un && over>=c.maxOver) return false;

        if(c.uniqueLastDigit){
          const d = n%10;
          if(lastDigit.has(d)) return false;
        }
        return true;
      };

      const add = (n)=>{
        used.add(n);
        picked.push(n);
        if(isOdd(n)) odd++; else even++;
        if(isUnder(n)) under++; else over++;
        if(c.uniqueLastDigit) lastDigit.add(n%10);
      };

      const pickFrom = (arr, need, seedOff)=>{
        if(need<=0 || !arr.length) return;
        const maxTries = 220;
        for(let i=0; i<maxTries && picked.length<10 && need>0; i++){
          const idx = (seedOff + i*step) % arr.length;
          const n = arr[idx];
          if(canAdd(n)){ add(n); need--; }
        }
      };

      pickFrom(top, plan.topN, offset+3);
      pickFrom(mid, plan.midN, offset+17);
      pickFrom(low, plan.lowN, offset+41);

      if(picked.length<10){
        for(let i=0; i<baseRankNums.length && picked.length<10; i++){
          const idx = (offset + i*step) % baseRankNums.length;
          const n = baseRankNums[idx];
          if(canAdd(n)) add(n);
        }
      }

      if(picked.length<10){
        for(const n of baseRankNums){
          if(picked.length>=10) break;
          if(!used.has(n)){ used.add(n); picked.push(n); }
        }
      }

      picked.sort((a,b)=>a-b);
      return picked.slice(0,10);
    };

    const strict = { ...caps };
    const relax1 = { ...caps, uniqueLastDigit:false };
    const relax2 = { ...relax1, minGap:0 };
    const relax3 = { ...relax2, maxUnder:null, maxOver:null };
    const relax4 = { ...relax3, maxOdd:null, maxEven:null };

    return attempt(strict) || attempt(relax1) || attempt(relax2) || attempt(relax3) || attempt(relax4);
  }

  function generateSets(mode, cycle){
    const f = state.freq;
    const overallNums = (f.rank || []).map(x=>x.n);
    const recentNums  = (f.recentRank || []).map(x=>x.n);
    const scoreNums   = buildScoreRank(f.freq || {}, f.recentFreq || {});

    const latestSeed = Number(f.latest?.dhRound || 0) || 0;
    const step = 11;

    const recipes = [
      { label:"믹스(누적+최근) / 균형(홀짝 5:5, 언더/오버 5:5)", base:"score",
        plan:{topCut:24, midCut:52, topN:6, midN:3, lowN:1},
        caps:{maxOdd:5, maxEven:5, maxUnder:5, maxOver:5, minGap:2, uniqueLastDigit:true}
      },
      { label:"최근 가중 / 분산", base:"recent",
        plan:{topCut:24, midCut:52, topN:7, midN:2, lowN:1},
        caps:{maxOdd:6, maxEven:4, maxUnder:6, maxOver:4, minGap:2, uniqueLastDigit:true}
      },
      { label:"누적 상위 / 균형", base:"overall",
        plan:{topCut:20, midCut:50, topN:6, midN:3, lowN:1},
        caps:{maxOdd:5, maxEven:5, maxUnder:5, maxOver:5, minGap:1, uniqueLastDigit:false}
      },
      { label:"언더(1~35) 쏠림", base:"score",
        plan:{topCut:24, midCut:52, topN:5, midN:4, lowN:1},
        caps:{maxOdd:6, maxEven:4, maxUnder:7, maxOver:3, minGap:2, uniqueLastDigit:false}
      },
      { label:"오버(36~70) 쏠림", base:"score",
        plan:{topCut:24, midCut:52, topN:5, midN:4, lowN:1},
        caps:{maxOdd:4, maxEven:6, maxUnder:3, maxOver:7, minGap:2, uniqueLastDigit:false}
      },
      { label:"끝수 분산(0~9 중복 최소)", base:"score",
        plan:{topCut:28, midCut:56, topN:6, midN:3, lowN:1},
        caps:{maxOdd:5, maxEven:5, maxUnder:5, maxOver:5, minGap:1, uniqueLastDigit:true}
      },
      { label:"간격 넓게(뭉침 최소)", base:"score",
        plan:{topCut:24, midCut:52, topN:6, midN:3, lowN:1},
        caps:{maxOdd:5, maxEven:5, maxUnder:5, maxOver:5, minGap:3, uniqueLastDigit:false}
      },
      { label:"하위 스파이스(저빈도 비중↑)", base:"overall",
        plan:{topCut:20, midCut:50, topN:4, midN:3, lowN:3},
        caps:{maxOdd:6, maxEven:4, maxUnder:5, maxOver:5, minGap:1, uniqueLastDigit:false}
      },
      { label:"홀수 우세(6:4)", base:"score",
        plan:{topCut:24, midCut:52, topN:6, midN:3, lowN:1},
        caps:{maxOdd:6, maxEven:4, maxUnder:5, maxOver:5, minGap:1, uniqueLastDigit:false}
      },
      { label:"짝수 우세(4:6)", base:"score",
        plan:{topCut:24, midCut:52, topN:6, midN:3, lowN:1},
        caps:{maxOdd:4, maxEven:6, maxUnder:5, maxOver:5, minGap:1, uniqueLastDigit:false}
      }
    ];

    const baseBy = (which)=>{
      if(which==="recent" && recentNums.length) return recentNums;
      if(which==="overall" && overallNums.length) return overallNums;
      return scoreNums.length ? scoreNums : (overallNums.length ? overallNums : recentNums);
    };

    const sets = [];
    for(let i=0;i<mode;i++){
      const r = recipes[i % recipes.length];
      const baseRankNums = baseBy(r.base);
      const offset = (latestSeed + (cycle*29) + i*17 + 31) % Math.max(1, baseRankNums.length);
      const nums = makePickSet({ baseRankNums, plan:r.plan, caps:r.caps, offset, step });
      sets.push({ label:r.label, nums });
    }
    return sets;
  }

  function renderBallsAnimated(container, nums){
    container.innerHTML = "";
    nums.forEach(()=> {
      const s = document.createElement("span");
      s.className = "ball ghost";
      s.textContent = "?";
      container.appendChild(s);
    });
    nums.forEach((n, i)=>{
      setTimeout(()=>{
        const b = container.children[i];
        b.className = "ball " + colorClass(n);
        b.textContent = pad2(n);
      }, 120 * i);
    });
  }

  function renderSets(mode, cycle){
    const box = el("sets");
    box.innerHTML = "";
    const sets = generateSets(mode, cycle);

    sets.forEach((s, idx)=>{
      const st = stats(s.nums);

      const wrap = document.createElement("div");
      wrap.className = "set";

      const top = document.createElement("div");
      top.className = "top";

      const lab = document.createElement("div");
      lab.className = "label";
      lab.textContent = `${idx+1}) ${s.label}`;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `홀/짝 ${st.odd}/${st.even} · 언더/오버 ${st.under}/${st.over} · 합 ${st.sum}`;

      top.appendChild(lab);
      top.appendChild(meta);

      const balls = document.createElement("div");
      balls.className = "balls";

      wrap.appendChild(top);
      wrap.appendChild(balls);
      box.appendChild(wrap);

      renderBallsAnimated(balls, s.nums);
    });
  }

  function renderTop20(){
    const f = state.freq;
    const grid = el("topGrid");
    grid.innerHTML = "";

    const top = (f.rank || []).slice(0, 20);
    const totalBalls = Number(f.totalBalls || 0);

    el("topNote").textContent = totalBalls ? `총 표본(볼): ${totalBalls.toLocaleString()}` : "-";

    top.forEach((x)=>{
      const div = document.createElement("div");
      div.className = "mini";
      const pct = totalBalls ? (x.count / totalBalls * 100) : 0;
      div.innerHTML = `<b>#${pad2(x.n)}</b><span>출현 ${x.count.toLocaleString()}회 · ${pct.toFixed(2)}%</span>`;
      grid.appendChild(div);
    });
  }

  function renderRecentDraws(){
    const box = el("recentDraws");
    box.innerHTML = "";
    const recent = (state.draws || []).slice(0,3);

    recent.forEach((d)=>{
      const wrap = document.createElement("div");
      wrap.className = "set";

      const top = document.createElement("div");
      top.className = "top";

      const lab = document.createElement("div");
      lab.className = "label";
      const key = d.dhRound ? `dhRound ${d.dhRound}` : (d.date ? `${d.date} #${d.round}` : "최근");
      lab.textContent = key;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = d.date ? `날짜 ${d.date}` : "";

      top.appendChild(lab);
      top.appendChild(meta);

      const balls = document.createElement("div");
      balls.className = "balls";

      wrap.appendChild(top);
      wrap.appendChild(balls);
      box.appendChild(wrap);

      (d.numbers || []).slice(0, 20).forEach((n)=>{
        const b = document.createElement("span");
        b.className = "ball " + colorClass(n);
        b.textContent = pad2(n);
        balls.appendChild(b);
      });
    });
  }

  function setHeaderPills(){
    const f = state.freq;
    el("pillUpdated").textContent = `데이터 갱신: ${f.updatedAt || "-"}`;
    el("pillDraws").textContent = `누적 회차: ${(f.totalDraws || 0).toLocaleString()}회`;
    el("pillLatest").textContent = `최신 회차: ${f.latest?.dhRound ?? "-"}`;
  }

  function showError(msg){
    const box = el("errBox");
    box.style.display = "block";
    box.textContent = msg;
  }

  async function boot(){
    try{
      state.freq = await fetchJsonWithFallback(FREQ_CANDIDATES);
      try{ state.draws = await fetchJsonWithFallback(DRAWS_CANDIDATES); }
      catch{ state.draws = []; }

      setHeaderPills();
      renderTop20();
      renderRecentDraws();

      state.mode = 10;
      state.cycle = loadCycle(state.mode);
      renderSets(state.mode, state.cycle);
    }catch(e){
      showError(
        "데이터 로드에 실패했습니다. (1) Actions 커밋에 speed-c/data/*.json 또는 data/*.json이 존재하는지 확인, (2) Pages 소스가 어디든 이 버전은 자동 대응합니다.\n" +
        String(e?.message || e)
      );
    }
  }

  function setMode(mode){
    state.mode = mode;
    state.cycle = loadCycle(mode);
    renderSets(state.mode, state.cycle);
  }
  function nextCycle(){
    state.cycle += 1;
    saveCycle(state.mode, state.cycle);
    renderSets(state.mode, state.cycle);
  }

  el("btn1").addEventListener("click", ()=> setMode(1));
  el("btn5").addEventListener("click", ()=> setMode(5));
  el("btn10").addEventListener("click", ()=> setMode(10));
  el("btnNext").addEventListener("click", ()=> nextCycle());

  boot();
</script>
</body>
</html>
